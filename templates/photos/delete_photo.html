{% extends 'base.html' %}
{% block content %}

<div class="card p-4">
    <!-- Bootstrap card container with padding for styling -->
    <h3 class="text-danger mb-3">Delete Post</h3>
    <p>Are you sure you want to delete this post?</p>

    <div class="mb-3">
         <!-- Container for displaying the image -->
        <img src="{{ photo.image.url }}" class="img-fluid rounded" style="max-height:300px;">
    </div>

    <form method="POST">
        {% csrf_token %}
        <button class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'feed' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
