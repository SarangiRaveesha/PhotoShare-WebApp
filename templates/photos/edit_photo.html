{% extends 'base.html' %}
{% block content %}

<div class="card p-4">
     <!-- Title for edit functionality -->
    <h4 class="mb-3">Edit Post</h4>

    <form method="POST" enctype="multipart/form-data">
         <!-- POST method for updating data -->
        <!-- enctype is required to upload image files -->
        {% csrf_token %}

        <div class="mb-3">
            <img src="{{ photo.image.url }}" class="img-fluid rounded" style="max-height:300px;">
        </div>

        <label class="form-label">Change Image</label>
        <input type="file" name="image" class="form-control mb-3">

        <label class="form-label">Caption</label>
        <textarea name="caption" class="form-control mb-3">{{ photo.caption }}</textarea>

        <label class="form-label">Visibility</label>
        <select name="visibility" class="form-control mb-3">
            <option value="public" {% if photo.visibility == 'public' %}selected{% endif %}>Public</option>
            <option value="friends" {% if photo.visibility == 'friends' %}selected{% endif %}>Friends</option>
            <option value="private" {% if photo.visibility == 'private' %}selected{% endif %}>Private</option>
        </select>

        <label class="form-label">Tag Friends</label>
        <div class="border rounded p-3 mb-3" style="max-height:220px; overflow-y:auto;">
            {% for friend in friends %}
                <div class="form-check mb-2">
                    <input
                        class="form-check-input"
                        type="checkbox"
                        name="tagged_users"
                        value="{{ friend.id }}"
                        id="editfriend{{ friend.id }}"
                        {% if friend.id in tagged_ids %}checked{% endif %}
                    >
                    <label class="form-check-label" for="editfriend{{ friend.id }}">
                        {{ friend.username }}
                    </label>
                </div>
            {% empty %}
                <p class="text-muted mb-0">No friends available for tagging.</p>
            {% endfor %}
        </div>

        <button class="btn btn-primary">Update Post</button>
        <a href="{% url 'feed' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
