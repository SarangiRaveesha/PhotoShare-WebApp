{% extends 'base.html' %}
{% block content %}

<div class="card p-4 mx-auto" style="max-width:500px;">
    <h2 class="text-center mb-3">Register</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
        <input type="password" name="password1" class="form-control mb-3" placeholder="Password" required>
        <input type="password" name="password2" class="form-control mb-3" placeholder="Confirm Password" required>

        <label class="form-label">Profile Picture</label>
        <input type="file" name="avatar" class="form-control mb-3">

        <label class="form-label">Bio</label>
        <textarea name="bio" class="form-control mb-3" rows="4" placeholder="Write a short bio about yourself..."></textarea>

        <button class="btn btn-success w-100">Register</button>
    </form>

    <p class="text-center mt-3 mb-0">
        Already have an account? <a href="/login/">Login</a>
    </p>
</div>

{% endblock %}
